<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Join EcoShine Revolution</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { emerald: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#fbbf24',600:'#d97706',700:'#b45309',800:'#1f2937',900:'#111827',950:'#000000' } }, fontFamily: { sans: ['Inter','sans-serif'], outfit: ['Outfit','sans-serif'] } } }
        }
    </script>
</head>
<body class="bg-emerald-50 dark:bg-emerald-950 text-emerald-950 dark:text-white font-sans antialiased">
    <!-- Floating Toggles -->
    <div class="fixed top-6 right-6 md:top-8 md:right-8 flex items-center gap-3 z-50">
        <button id="theme-toggle" class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl text-white hover:bg-white/10 hover:scale-110 transition-all">
            <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
            <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        </button>
        <button id="rtl-toggle" class="px-4 py-2 md:px-5 md:py-3 bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl text-[10px] font-black uppercase text-white hover:text-emerald-500 hover:scale-110 transition-all leading-none">RTL</button>
    </div>

    <div class="pt-24 pb-12 w-full flex items-center justify-center min-h-screen p-4 md:p-6">
        <div class="w-full max-w-2xl bg-white dark:bg-emerald-950 rounded-[2rem] md:rounded-[4rem] p-6 md:p-14 shadow-[0_50px_100px_-20px_rgba(0,0,0,0.5)] border border-emerald-100/10 relative overflow-hidden text-center backdrop-blur-xl mx-auto hover:scale-[1.01] transition-all duration-500 hover:shadow-[0_80px_150px_-30px_rgba(0,0,0,0.7)] hover:border-emerald-500/30 group/card">
        <!-- Form Column -->
        <div class="p-0 md:p-8 space-y-8 md:space-y-12">
            <div class="text-center">
                <div class="space-y-4">
                    <a href="index.html" class="inline-flex items-center space-x-4 mb-4 md:mb-8 group justify-center">
                        <img src="assets/images/logo.png" alt="EcoShine Logo" class="w-10 h-10 md:w-12 md:h-12 object-contain group-hover:scale-110 transition-transform">
                        <span class="text-2xl md:text-3xl font-outfit font-black uppercase tracking-tighter text-emerald-950 dark:text-white uppercase">EcoShine</span>
                    </a>
                    <h2 class="text-3xl md:text-5xl font-outfit font-black text-emerald-950 dark:text-white uppercase leading-tight">Start Your <br><span class="text-emerald-500 italic">Legacy.</span></h2>
                    <p class="text-gray-400 font-medium max-w-sm mx-auto text-sm md:text-base">Join the exclusive circle of sustainable luxury car owners.</p>
                </div>
            </div>

            <form action="login.html" class="space-y-4 md:space-y-5">
                <div class="space-y-3">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase tracking-widest text-emerald-900 dark:text-emerald-400 opacity-50">First Name</label>
                        <div class="relative group text-left">
                            <i data-lucide="user" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-emerald-500 transition-colors"></i>
                            <input type="text" placeholder="John" required class="w-full pl-16 pr-6 py-3 md:py-4 bg-emerald-50 dark:bg-emerald-800 rounded-[1.2rem] border-2 border-transparent focus:border-emerald-500 focus:outline-none transition-all placeholder:text-gray-400/50">
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase tracking-widest text-emerald-900 dark:text-emerald-400 opacity-50">Last Name</label>
                        <div class="relative group text-left">
                            <i data-lucide="user-plus" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-emerald-500 transition-colors"></i>
                            <input type="text" placeholder="Doe" required class="w-full pl-16 pr-6 py-3 md:py-4 bg-emerald-50 dark:bg-emerald-800 rounded-[1.2rem] border-2 border-transparent focus:border-emerald-500 focus:outline-none transition-all placeholder:text-gray-400/50">
                        </div>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-3 md:gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase tracking-widest text-emerald-900 dark:text-emerald-400 opacity-50">Email Address</label>
                        <div class="relative group text-left">
                            <i data-lucide="mail" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-emerald-500 transition-colors"></i>
                            <input type="email" placeholder="john@example.com" required class="w-full pl-16 pr-6 py-3 md:py-4 bg-emerald-50 dark:bg-emerald-800 rounded-[1.2rem] border-2 border-transparent focus:border-emerald-500 focus:outline-none transition-all placeholder:text-gray-400/50">
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase tracking-widest text-emerald-900 dark:text-emerald-400 opacity-50">Phone Number</label>
                        <div class="relative group text-left">
                            <i data-lucide="phone" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-emerald-500 transition-colors"></i>
                            <input type="tel" placeholder="+1 (555) 000-0000" required class="w-full pl-16 pr-6 py-3 md:py-4 bg-emerald-50 dark:bg-emerald-800 rounded-[1.2rem] border-2 border-transparent focus:border-emerald-500 focus:outline-none transition-all placeholder:text-gray-400/50">
                        </div>
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-widest text-emerald-900 dark:text-emerald-400 opacity-50">Secure Password</label>
                    <div class="relative group text-left">
                        <i data-lucide="lock" class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-emerald-500 transition-colors"></i>
                        <input type="password" placeholder="••••••••" required class="w-full pl-16 pr-6 py-3 md:py-4 bg-emerald-50 dark:bg-emerald-800 rounded-[1.2rem] border-2 border-transparent focus:border-emerald-500 focus:outline-none transition-all placeholder:text-gray-400/50">
                    </div>
                </div>

                <div class="space-y-6">
                    <button type="submit" class="w-full py-3 md:py-4 bg-emerald-500 text-emerald-950 font-black text-base md:text-lg rounded-[1.2rem] transition-all shadow-2xl shadow-emerald-500/30 hover:scale-[1.05] hover:shadow-emerald-500/50 active:scale-95 uppercase">Create Exclusive Account</button>
                    <p class="text-[10px] text-gray-400 text-center uppercase tracking-widest font-bold leading-relaxed">By signing up you agree to our <a href="#" class="text-emerald-500 underline">Terms of Detailing</a></p>
                </div>
            </form>

            <p class="text-center text-sm font-bold text-gray-400 italic">Already in the circle? <a href="login.html" class="text-emerald-500 not-italic uppercase font-black hover:underline ml-2">Sign In</a></p>

                            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
                        </svg>
                    </button>
            </div>
        </div>
    </div>
</div>



    <button id="scroll-top" class="fixed bottom-8 right-8 z-50 w-12 h-12 flex items-center justify-center bg-emerald-500 text-emerald-950 rounded-2xl shadow-2xl opacity-0 invisible hover:scale-110 active:scale-95 transition-all"><i data-lucide="chevron-up" class="w-6 h-6"></i></button>

    <script src="assets/js/main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
